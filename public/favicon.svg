<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Neon teal gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f5d4"/>
      <stop offset="60%"  stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer hex ring -->
  <polygon
    points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="none"
    stroke="url(#g1)"
    stroke-width="1.2"
    opacity="0.5"
  />

  <!-- Inner accent ring -->
  <polygon
    points="32,10 50,21 50,43 32,54 14,43 14,21"
    fill="none"
    stroke="url(#g1)"
    stroke-width="0.6"
    opacity="0.25"
  />

  <!-- S letter -->
  <text
    x="32" y="36"
    font-family="'Arial Black', sans-serif"
    font-weight="900"
    font-size="22"
    text-anchor="middle"
    fill="url(#g1)"
    filter="url(#glow)"
    letter-spacing="-1"
  >S</text>

  <!-- Corner dots — code aesthetic -->
  <circle cx="10" cy="10" r="1.5" fill="#00f5d4" opacity="0.7"/>
  <circle cx="54" cy="10" r="1.5" fill="#7b2fff" opacity="0.7"/>
  <circle cx="10" cy="54" r="1.5" fill="#7b2fff" opacity="0.7"/>
  <circle cx="54" cy="54" r="1.5" fill="#00f5d4" opacity="0.7"/>

  <!-- Bottom tag line -->
  <text
    x="32" y="58"
    font-family="'Courier New', monospace"
    font-size="5"
    text-anchor="middle"
    fill="#00f5d4"
    opacity="0.6"
    letter-spacing="2"
  >SSB</text>
</svg>
