<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>

    <!-- Main neon gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f5d4"/>
      <stop offset="55%"  stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>

    <!-- Subtle inner glow -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00f5d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#060610" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for S -->
    <filter id="glowS" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for rings -->
    <filter id="glowRing" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="24" cy="24" r="22"/>
    </clipPath>

  </defs>

  <!-- ── Dark background circle ── -->
  <circle cx="24" cy="24" r="23" fill="#060610"/>
  <circle cx="24" cy="24" r="23" fill="url(#orbGlow)"/>

  <!-- ── Outer border ring ── -->
  <circle
    cx="24" cy="24" r="22"
    fill="none"
    stroke="url(#neonGrad)"
    stroke-width="1"
    opacity="0.7"
  />

  <!-- ── Hex shape (rotated square as diamond accent) ── -->
  <polygon
    points="24,4 40,14 40,34 24,44 8,34 8,14"
    fill="none"
    stroke="url(#neonGrad)"
    stroke-width="0.8"
    opacity="0.35"
    filter="url(#glowRing)"
  />

  <!-- ── Inner faint hex ── -->
  <polygon
    points="24,10 36,17 36,31 24,38 12,31 12,17"
    fill="none"
    stroke="url(#neonGrad)"
    stroke-width="0.4"
    opacity="0.18"
  />

  <!-- ── Cross-hair lines (tech aesthetic) ── -->
  <line x1="24" y1="2"  x2="24" y2="8"  stroke="#00f5d4" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="40" x2="24" y2="46" stroke="#00f5d4" stroke-width="0.8" opacity="0.5"/>
  <line x1="2"  y1="24" x2="8"  y2="24" stroke="#7b2fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="24" x2="46" y2="24" stroke="#7b2fff" stroke-width="0.8" opacity="0.5"/>

  <!-- ── Corner bracket marks ── -->
  <!-- top-left -->
  <path d="M 6 12 L 6 6 L 12 6"  fill="none" stroke="#00f5d4" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- top-right -->
  <path d="M 42 12 L 42 6 L 36 6" fill="none" stroke="#00f5d4" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- bottom-left -->
  <path d="M 6 36 L 6 42 L 12 42" fill="none" stroke="#7b2fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- bottom-right -->
  <path d="M 42 36 L 42 42 L 36 42" fill="none" stroke="#7b2fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- ── S letterform ── -->
  <text
    x="24"
    y="30"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-weight="900"
    font-size="20"
    text-anchor="middle"
    fill="url(#neonGrad)"
    filter="url(#glowS)"
    letter-spacing="-0.5"
  >S</text>

  <!-- ── Tiny dot accents at cardinal points ── -->
  <circle cx="24" cy="3.5"  r="1.2" fill="#00f5d4" opacity="0.9"/>
  <circle cx="24" cy="44.5" r="1.2" fill="#00f5d4" opacity="0.9"/>
  <circle cx="3.5" cy="24"  r="1.2" fill="#7b2fff" opacity="0.9"/>
  <circle cx="44.5" cy="24" r="1.2" fill="#7b2fff" opacity="0.9"/>

</svg>
